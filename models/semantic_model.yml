saved_queries:
  - name: order_metrics
    description: Relevant order metrics
    query_params:
      metrics:
        - fct_orders
      group_by:
        - Entity('order_id')
        - "TimeDimension('metric_time', 'day')"
        - "TimeDimension('metric_time', 'month')"
    exports:
      - name: order_metrics
        config:
          export_as: table
          schema: TONAYYA_SL