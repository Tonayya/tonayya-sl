saved_queries:
  - name: order_metrics
    description: Relevant order metrics
    query_params:
      metrics:
        - fct_orders
      group_by:
        - Entity('order_id')
      where:
        - "{{TimeDimension('metric_time')}} > current_timestamp - interval '1 week'"
    exports:
      - name: order_metrics
        config:
          export_as: table
          schema: TONAYYA_SL