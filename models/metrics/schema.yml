models:
  - name: metricflow_time_spine
    description: "A daily time spine ranging from 2000-01-01 to 2027-01-01 for use with MetricFlow."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "The base date column for daily granularity."
        granularity: day